<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KNALL</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --accent: #2563eb;
      --border: #e3e8f0;
      --text: #111827;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    h1, h2 { margin: 0 0 12px; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
    label { display: block; margin-top: 8px; font-weight: 600; }
    input { width: 100%; padding: 10px; margin-top: 4px; border-radius: 8px; border: 1px solid var(--border); font-size: 15px; }
    button { background: var(--accent); color: #fff; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 15px; }
    button.secondary { background: #e5e7eb; color: #111; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .row { border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin: 8px 0; background: #fff; }
    .row strong { font-size: 16px; }
    #suggestions { position: relative; }
    .suggest-box { position: absolute; background: #fff; border: 1px solid var(--border); border-radius: 10px; width: 100%; max-height: 220px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.08); z-index: 10; }
    .suggest { padding: 10px; cursor: pointer; }
    .suggest:hover { background: #f3f4f6; }
    .tag { display: inline-block; background: #fef3c7; color: #92400e; border-radius: 6px; padding: 2px 6px; font-size: 12px; margin-left: 6px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .hero { display: flex; align-items: flex-start; gap: 12px; }
    .logo { width: 110px; height: auto; margin-left: auto; }
    .hero-text { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .hero-text { display: flex; flex-direction: column; gap: 4px; }
    .hero-title { font-size: 28px; font-weight: 700; line-height: 1.1; letter-spacing: 0.6px; }
    .hero-subtitle { font-size: 15px; font-weight: 700; display: flex; flex-wrap: wrap; gap: 2px; }
    .c1 { color: #e63946; }
    .c2 { color: #f4a261; }
    .c3 { color: #2a9d8f; }
    .c4 { color: #457b9d; }
    .c5 { color: #9b5de5; }
    .search-wrap { margin-top: 6px; border-radius: 10px; padding: 6px; background: repeating-linear-gradient(45deg,#facc15 0,#facc15 12px,#111 12px,#111 24px); }
    .search-wrap input { border: 3px solid #111; border-radius: 8px; width: 100%; padding: 10px; font-weight: 700; background: #fff; }
    .status { margin-top: 12px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: #eff6ff; color: #1d4ed8; display: none; }
    .status.error { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .status.success { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    @media (max-width: 640px) {
      .logo { width: 80px; }
      .hero-title { font-size: 24px; }
      .hero-subtitle { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="hero">
      <div class="hero-text">
        <div class="hero-title">
          <span class="c1">K.</span><span class="c2">N.</span><span class="c3">A.</span><span class="c4">L.</span><span class="c5">L.</span>
        </div>
        <div class="hero-subtitle">
          <span class="c1">👉</span>
          <span class="c2">Kunterbunte</span>
          <span class="c3">Notfall-Anruf-Liste</span>
          <span class="c4">der</span>
          <span class="c5">Lehrkräfte</span>
        </div>
      </div>
      <img src="Logo_Kunterbunt.png" alt="Kunterbunt Logo" class="logo">
    </div>
    <div id="suggestions">
      <label>Suche und wähle eine Person.</label>
      <div class="search-wrap">
        <input id="search" placeholder="Tippe Vorname oder Nachname" oninput="suggest()" autocomplete="off">
      </div>
      <div id="suggestBox" class="suggest-box" style="display:none"></div>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div class="panel">
    <form id="form" onsubmit="save(event)">
      <input type="hidden" id="id">
      <label>Vorname <input id="vorname" required></label>
      <label>Name <input id="name" required></label>
      <label>Name der ersten Kontaktperson <input id="nf1Name"></label>
      <label>Telefon der ersten Kontaktperson <input id="nf1Tel"></label>
      <label>Beziehung der ersten Kontaktperson <input id="nf1Bez"></label>
      <label>Name der zweiten Kontaktperson <input id="nf2Name"></label>
      <label>Telefon der zweiten Kontaktperson <input id="nf2Tel"></label>
      <label>Beziehung der zweiten Kontaktperson <input id="nf2Bez"></label>
      <div class="actions">
        <button type="submit">Speichern</button>
        <button type="button" class="secondary" onclick="resetForm()">Felder leeren</button>
      </div>
    </form>
  </div>

  <div id="list" style="margin-top:12px;"></div>

<script>
const BASE = 'https://script.google.com/macros/s/AKfycbyMXIWipxnIuU68JSV-X32ax09YEFm4Xzz7zLuQPbvagSfL7e09HpvhHU3kNNBtxJU3dQ/exec';

let cache = [];
let isSaving = false;

async function loadAll() {
  try {
    setStatus('Lade Daten ...');
    cache = await fetchJson(BASE);
    render(cache);
    clearStatus();
  } catch (err) {
    render([]);
    setStatus(`Fehler beim Laden: ${err.message}`, 'error');
  }
}

function render(rows) {
  const list = document.getElementById('list');
  if (!rows.length) { list.innerHTML = '<p>Keine Einträge.</p>'; return; }
  list.innerHTML = rows.map(r => {
    const missing = missingFields(r);
    return `
      <div class="row">
        <strong>${escape(r.vorname)} ${escape(r.name)}</strong>
        ${missing.length ? `<span class="tag">${missing.join(', ')} fehlen</span>` : ''}<br>
        NF1: ${fmt(r.notfall1Name)} (${fmt(r.notfall1Tel)}) ${fmt(r.notfall1Bez)}<br>
        NF2: ${fmt(r.notfall2Name)} (${fmt(r.notfall2Tel)}) ${fmt(r.notfall2Bez)}<br>
        <button onclick='edit(${r.id})'>Bearbeiten</button>
      </div>`;
  }).join('');
}

function fmt(v){ return v ? escape(v) : '—'; }
function missingFields(r){
  const miss = [];
  if (!r.notfall1Name) miss.push('NF1 Name');
  if (!r.notfall1Tel) miss.push('NF1 Tel');
  if (!r.notfall2Name) miss.push('NF2 Name');
  if (!r.notfall2Tel) miss.push('NF2 Tel');
  return miss;
}

function suggest() {
  const q = document.getElementById('search').value.toLowerCase();
  const box = document.getElementById('suggestBox');
  if (!q) { box.style.display = 'none'; box.innerHTML = ''; return; }
  const matches = cache
    .filter(r => (`${r.vorname} ${r.name}`).toLowerCase().includes(q))
    .slice(0, 8);
  if (!matches.length) { box.style.display = 'none'; box.innerHTML = ''; return; }
  box.innerHTML = matches.map(r => `<div class="suggest" onclick="choose(${r.id})">${escape(r.vorname)} ${escape(r.name)}</div>`).join('');
  box.style.display = 'block';
}

function choose(id){ edit(id); document.getElementById('suggestBox').style.display='none'; }

function edit(id){
  const r = cache.find(x => x.id === id);
  if(!r) return;
  document.getElementById('id').value = r.id;
  set('vorname', r.vorname); set('name', r.name);
  set('nf1Name', r.notfall1Name); set('nf1Tel', r.notfall1Tel); set('nf1Bez', r.notfall1Bez);
  set('nf2Name', r.notfall2Name); set('nf2Tel', r.notfall2Tel); set('nf2Bez', r.notfall2Bez);
}

function set(id,v){ document.getElementById(id).value = v || ''; }

async function save(e){
  e.preventDefault();
  if (isSaving) return;
  const body = {
    id: val('id') || undefined,
    vorname: val('vorname'), name: val('name'),
    nf1Name: val('nf1Name'), nf1Tel: val('nf1Tel'), nf1Bez: val('nf1Bez'),
    nf2Name: val('nf2Name'), nf2Tel: val('nf2Tel'), nf2Bez: val('nf2Bez')
  };
  const submitButton = document.querySelector('#form button[type="submit"]');
  try {
    isSaving = true;
    submitButton.disabled = true;
    setStatus('Speichere Daten ...');
    await fetchJson(BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    });
    resetForm();
    await loadAll();
    setStatus('Eintrag gespeichert.', 'success');
  } catch (err) {
    setStatus(`Fehler beim Speichern: ${err.message}`, 'error');
  } finally {
    isSaving = false;
    submitButton.disabled = false;
  }
}

function resetForm(){ document.getElementById('form').reset(); document.getElementById('id').value=''; }
function val(id){ return document.getElementById(id).value.trim(); }

function showMissing(){
  const missingOnly = cache.filter(r => missingFields(r).length);
  render(missingOnly);
}

function escape(str){
  return (str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'': '&#39;'}[s]));
}

async function fetchJson(url, options){
  const response = await fetch(url, options);
  const text = await response.text();
  if (!response.ok) {
    throw new Error(`HTTP ${response.status}`);
  }
  try {
    return JSON.parse(text);
  } catch (_) {
    throw new Error('Ungültige Serverantwort');
  }
}

function setStatus(message, type){
  const box = document.getElementById('status');
  box.textContent = message;
  box.className = `status${type ? ` ${type}` : ''}`;
  box.style.display = 'block';
}

function clearStatus(){
  const box = document.getElementById('status');
  box.textContent = '';
  box.className = 'status';
  box.style.display = 'none';
}

loadAll();
</script>
</body>
</html>
